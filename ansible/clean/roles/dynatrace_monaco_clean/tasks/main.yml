---
- name: "dynatrace_monaco_clean | Validate required Monaco credentials"
  ansible.builtin.assert:
    that:
      - dynatrace_monaco_clean_platform_url | length > 0
      - dynatrace_monaco_clean_platform_token | length > 0
    fail_msg: >-
      DT_PLATFORM_URL and DT_PLATFORM_TOKEN are required to remove Monaco configurations.

- name: "dynatrace_monaco_clean | Ensure Monaco config directory exists"
  ansible.builtin.file:
    path: "{{ dynatrace_monaco_clean_config_root }}"
    state: directory
    mode: "0755"

- name: "dynatrace_monaco_clean | Verify manifest file exists"
  ansible.builtin.stat:
    path: "{{ dynatrace_monaco_clean_manifest_path }}"
  register: dynatrace_monaco_clean_manifest_stat

- name: "dynatrace_monaco_clean | Fail when manifest is missing"
  ansible.builtin.assert:
    that:
      - dynatrace_monaco_clean_manifest_stat.stat.exists
    fail_msg: "Monaco manifest not found at {{ dynatrace_monaco_clean_manifest_path }}"

- name: "dynatrace_monaco_clean | Check for existing Monaco binary"
  ansible.builtin.stat:
    path: "{{ dynatrace_monaco_clean_binary_path }}"
  register: dynatrace_monaco_clean_binary_stat

- name: "dynatrace_monaco_clean | Get existing Monaco binary version"
  ansible.builtin.command:
    cmd: "{{ dynatrace_monaco_clean_binary_path }} version"
  register: dynatrace_monaco_clean_current_version
  changed_when: false
  failed_when: false
  when: dynatrace_monaco_clean_binary_stat.stat.exists

- name: "dynatrace_monaco_clean | Determine if Monaco download is required"
  ansible.builtin.set_fact:
    dynatrace_monaco_clean_download_required: >-
      {{
        (not dynatrace_monaco_clean_binary_stat.stat.exists)
        or
        (dynatrace_monaco_clean_version not in (dynatrace_monaco_clean_current_version.stdout | default('')))
      }}

- name: "dynatrace_monaco_clean | Download pinned Monaco binary"
  ansible.builtin.get_url:
    url: "{{ dynatrace_monaco_clean_download_url }}"
    dest: "{{ dynatrace_monaco_clean_binary_path }}"
    mode: "0755"
    force: true
    validate_certs: "{{ dynatrace_monaco_clean_validate_certs }}"
  when: dynatrace_monaco_clean_download_required

- name: "dynatrace_monaco_clean | Remove stale delete file"
  ansible.builtin.file:
    path: "{{ dynatrace_monaco_clean_delete_file_path }}"
    state: absent

- name: "dynatrace_monaco_clean | Generate Monaco delete file"
  ansible.builtin.command:
    cmd: >-
      {{ dynatrace_monaco_clean_binary_path }}
      generate deletefile manifest.yaml
      --file {{ dynatrace_monaco_clean_delete_file_path | basename }}
      --verbose
    chdir: "{{ dynatrace_monaco_clean_config_root }}"
  environment:
    MONACO_FEAT_PLATFORM_TOKEN: "true"
    DT_PLATFORM_URL: "{{ dynatrace_monaco_clean_platform_url }}"
    DT_PLATFORM_TOKEN: "{{ dynatrace_monaco_clean_platform_token }}"
  register: dynatrace_monaco_clean_generate_delete_file
  changed_when: true

- name: "dynatrace_monaco_clean | Run Monaco delete"
  ansible.builtin.command:
    cmd: >-
      {{ dynatrace_monaco_clean_binary_path }}
      delete
      --manifest manifest.yaml
      --file {{ dynatrace_monaco_clean_delete_file_path | basename }}
      --verbose
    chdir: "{{ dynatrace_monaco_clean_config_root }}"
  environment:
    MONACO_FEAT_PLATFORM_TOKEN: "true"
    DT_PLATFORM_URL: "{{ dynatrace_monaco_clean_platform_url }}"
    DT_PLATFORM_TOKEN: "{{ dynatrace_monaco_clean_platform_token }}"
  register: dynatrace_monaco_clean_delete
  failed_when: >-
    dynatrace_monaco_clean_delete.rc != 0
    and
    (
      ('constraintviolations' not in (dynatrace_monaco_clean_delete.stdout | lower))
      or
      (
        ('builtin:openpipeline.spans.routing' not in (dynatrace_monaco_clean_delete.stdout | lower))
        and
        ('builtin:openpipeline.logs.routing' not in (dynatrace_monaco_clean_delete.stdout | lower))
        and
        ('builtin:openpipeline.bizevents.routing' not in (dynatrace_monaco_clean_delete.stdout | lower))
      )
    )
  changed_when: >-
    ('no configurations to delete' not in (dynatrace_monaco_clean_delete.stdout | lower))
    and
    ('no configuration changes' not in (dynatrace_monaco_clean_delete.stdout | lower))

- name: "dynatrace_monaco_clean | Warn about partial cleanup due to OpenPipeline dependencies"
  ansible.builtin.debug:
    msg: >-
      Monaco reported delete dependency constraints for OpenPipeline resources.
      Continuing because this is a known non-fatal cleanup limitation.
      Review Monaco output for referenced routing schemas.
  when: >-
    dynatrace_monaco_clean_delete.rc != 0
    and
    ('constraintviolations' in (dynatrace_monaco_clean_delete.stdout | lower))

- name: "dynatrace_monaco_clean | Display cleanup summary"
  ansible.builtin.debug:
    msg:
      - "Monaco version target:  {{ dynatrace_monaco_clean_version }}"
      - "Monaco binary path:    {{ dynatrace_monaco_clean_binary_path }}"
      - "Manifest path:         {{ dynatrace_monaco_clean_manifest_path }}"
      - "Delete file path:      {{ dynatrace_monaco_clean_delete_file_path }}"
      - "Delete rc:             {{ dynatrace_monaco_clean_delete.rc }}"
