---
# =============================================================
# EDA Controller objects: Decision Environment, Project, Rulebook Activation
#
# Run standalone via:
#   ansible-playbook deploy/playbooks/configure_eda.yml
#
# Environment variables:
#   EDA_PROJECT_GIT_URL      - Override the default repository URL (optional)
#   EDA_PROJECT_PUBLIC       - Set to 'false' for private repo (default: true)
#   EDA_PROJECT_SCM_USERNAME - SCM username (required when EDA_PROJECT_PUBLIC=false)
#   EDA_PROJECT_SCM_TOKEN    - SCM personal access token (required when EDA_PROJECT_PUBLIC=false)
# =============================================================

- name: "aap_config | Ensure generated password storage exists"
  ansible.builtin.file:
    path: "{{ aap_password_store_dir }}"
    state: directory
    mode: "0700"

- name: "aap_config | Resolve EDA service account password"
  ansible.builtin.set_fact:
    aap_eda_service_account_password: >-
      {{
        aap_eda_service_account_password
        if (aap_eda_service_account_password | length > 0)
        else lookup('ansible.builtin.password', aap_eda_service_account_password_store_file + ' length=24 chars=ascii_letters,digits')
      }}
  no_log: true

- name: "aap_config | Fail fast when private repo credentials are not provided"
  ansible.builtin.fail:
    msg: |
      EDA_PROJECT_PUBLIC is set to false but SCM credentials are missing.
      Please export both before running this playbook:
        export EDA_PROJECT_SCM_USERNAME=<your_scm_username>
        export EDA_PROJECT_SCM_TOKEN=<your_personal_access_token_with_repo_read_scope>
  when:
    - not aap_eda_project_public
    - aap_eda_scm_username == '' or aap_eda_scm_token == ''

- name: "aap_config | Verify private repository is accessible with provided credentials"
  ansible.builtin.uri:
    url: "{{ aap_eda_project_url | regex_replace('https://github.com/', 'https://api.github.com/repos/') | regex_replace('\\.git$', '') }}"
    method: GET
    user: "{{ aap_eda_scm_username }}"
    password: "{{ aap_eda_scm_token }}"
    force_basic_auth: true
    validate_certs: true
    status_code: 200
  no_log: true
  register: _eda_repo_check
  failed_when: false
  when:
    - not aap_eda_project_public
    - aap_eda_scm_username != ''
    - aap_eda_scm_token != ''

- name: "aap_config | Fail if private repository credentials did not authenticate"
  ansible.builtin.fail:
    msg: |
      The repository '{{ aap_eda_project_url }}' is private and the provided credentials did not work.
      Verify EDA_PROJECT_SCM_USERNAME and EDA_PROJECT_SCM_TOKEN are correct and the token has 'repo' read scope.
  when:
    - not aap_eda_project_public
    - _eda_repo_check is defined
    - _eda_repo_check.status is defined
    - _eda_repo_check.status != 200

- name: "aap_config | Register Dynatrace Decision Environment in EDA"
  ansible.eda.decision_environment:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_dt_de_name }}"
    description: "{{ aap_dt_de_description }}"
    image_url: "{{ aap_dt_de_image }}"
    organization_name: "{{ aap_org_name }}"
    state: present
  register: _aap_eda_dt_de_result

- name: "aap_config | Display Decision Environment registration result"
  ansible.builtin.debug:
    msg: "Dynatrace DE registered: {{ _aap_eda_dt_de_result.id | default('already present') }}"

- name: "aap_config | Create EDA SCM credential for private repository"
  ansible.eda.credential:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_scm_credential_name }}"
    description: "SCM credential for private EDA project source control"
    credential_type_name: "Source Control"
    inputs:
      username: "{{ aap_eda_scm_username }}"
      password: "{{ aap_eda_scm_token }}"
    organization_name: "{{ aap_org_name }}"
    state: present
  when: not aap_eda_project_public

- name: "aap_config | Create EDA project (public repository)"
  ansible.eda.project:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_project_name }}"
    description: "{{ aap_eda_project_description }}"
    url: "{{ aap_eda_project_url }}"
    organization_name: "{{ aap_org_name }}"
    state: present
  register: _aap_eda_project_result
  when: aap_eda_project_public

- name: "aap_config | Create EDA project (private repository)"
  ansible.eda.project:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_project_name }}"
    description: "{{ aap_eda_project_description }}"
    url: "{{ aap_eda_project_url }}"
    credential: "{{ aap_eda_scm_credential_name }}"
    organization_name: "{{ aap_org_name }}"
    state: present
  register: _aap_eda_project_result
  when: not aap_eda_project_public

- name: "aap_config | Display EDA project registration result"
  ansible.builtin.debug:
    msg: "EDA project registered: {{ (_aap_eda_project_result.id | default('already present')) if _aap_eda_project_result is not skipped else 'already present' }}"

- name: "aap_config | Wait for EDA project sync to complete"
  ansible.eda.project_info:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_project_name }}"
  register: _aap_eda_project_sync_result
  until: _aap_eda_project_sync_result.projects[0].import_state in ['completed', 'failed']
  retries: 30
  delay: 10

- name: "aap_config | Fail if EDA project sync did not complete successfully"
  ansible.builtin.fail:
    msg: "EDA project sync failed: {{ _aap_eda_project_sync_result.projects[0].import_error | default('unknown error') }}"
  when: _aap_eda_project_sync_result.projects[0].import_state == 'failed'

- name: "aap_config | Generate AAP Controller OAuth2 token for EDA credential"
  ansible.builtin.uri:
    url: "{{ aap_controller_host }}/api/controller/v2/tokens/"
    method: POST
    user: "{{ aap_eda_service_account_username }}"
    password: "{{ aap_eda_service_account_password }}"
    force_basic_auth: true
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    body_format: json
    body:
      description: "EDA rulebook activation token (managed by configure_eda.yml)"
      application: null
      scope: "write"
    status_code: 201
  register: _aap_controller_token_result
  no_log: true

- name: "aap_config | Create EDA AAP credential for rulebook activation"
  ansible.eda.credential:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_aap_credential_name }}"
    description: "AAP Controller credential for EDA rulebook activations"
    credential_type_name: "Red Hat Ansible Automation Platform"
    inputs:
      host: "{{ aap_eda_aap_credential_host }}"
      oauth_token: "{{ _aap_controller_token_result.json.token }}"
    organization_name: "{{ aap_org_name }}"
    state: present

- name: "aap_config | Create EDA rulebook activation for Dynatrace webhook"
  ansible.eda.rulebook_activation:
    controller_host: "{{ aap_eda_controller_host }}"
    controller_username: "{{ aap_eda_controller_username }}"
    controller_password: "{{ aap_eda_controller_password }}"
    validate_certs: "{{ aap_eda_controller_validate_certs }}"
    name: "{{ aap_eda_activation_name }}"
    description: "{{ aap_eda_activation_description }}"
    project_name: "{{ aap_eda_project_name }}"
    rulebook_name: "{{ aap_eda_activation_rulebook }}"
    decision_environment_name: "{{ aap_dt_de_name }}"
    organization_name: "{{ aap_org_name }}"
    extra_vars: "{{ aap_eda_activation_extra_vars | to_nice_yaml }}"
    eda_credentials:
      - "{{ aap_eda_aap_credential_name }}"
    state: "{{ 'enabled' if aap_eda_activation_enabled else 'disabled' }}"
  register: _aap_eda_activation_result

- name: "aap_config | Display EDA activation registration result"
  ansible.builtin.debug:
    msg: "EDA rulebook activation registered: {{ _aap_eda_activation_result.id | default('already present') }}"

- name: "aap_config | Display EDA configuration summary"
  ansible.builtin.debug:
    msg:
      - "Configured EDA Decision Environment: {{ aap_dt_de_name }}"
      - "  Image: {{ aap_dt_de_image }}"
      - "Configured EDA Project: {{ aap_eda_project_name }}"
      - "  URL: {{ aap_eda_project_url }}"
      - "Configured EDA Rulebook Activation: {{ aap_eda_activation_name }}"
      - "  Rulebook: {{ aap_eda_activation_rulebook }}"
      - "  Webhook port: {{ aap_eda_activation_dt_webhook_port }}"
      - "  Enabled: {{ aap_eda_activation_enabled }}"
