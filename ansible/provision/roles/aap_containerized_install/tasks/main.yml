---
- name: Skip role when disabled
  ansible.builtin.meta: end_host
  when: not aap_install_enabled

- name: Run preflight checks
  ansible.builtin.include_tasks:
    file: preflight.yml
    apply:
      become: true

- name: Prepare host OS for AAP containerized installation
  ansible.builtin.include_tasks:
    file: prepare_os.yml
    apply:
      become: true

- name: Stage installer and detect extracted directory
  ansible.builtin.include_tasks: stage_installer.yml

- name: Build inventory file from workshop variables
  ansible.builtin.include_tasks: build_inventory.yml

- name: Execute installer
  ansible.builtin.include_tasks: run_installer.yml
  when: aap_run_installer

- name: Validate AAP containerized installation
  ansible.builtin.include_tasks: validate_install.yml
  when: aap_run_installer

- name: Generate admin API token for MCP validation
  ansible.builtin.include_tasks: generate_admin_token.yml
  when:
    - aap_run_installer
    - aap_mcp_install | bool

- name: Validate MCP service and token access
  ansible.builtin.include_tasks: validate_mcp.yml
  when:
    - aap_run_installer
    - aap_mcp_install | bool

- name: Regenerate MCP certificate with custom SANs
  ansible.builtin.include_tasks: regenerate_mcp_cert.yml
  when:
    - aap_run_installer
    - aap_mcp_install | bool

- name: Log in to local registry for follow-on EE builds
  ansible.builtin.include_tasks:
    file: login_local_registry.yml
    apply:
      tags:
        - aap-registry-login
  when: aap_registry_auto_login | bool
  tags:
    - aap-registry-login
